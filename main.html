<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<title>HTML Signup Form</title>
</head>

<body>
	<!-- the entire body must be written by student -->
    <form method="post">
		<label for="name">Name:</label>
		<input type="text" id="name" placeholder="Name" required/>
		<br>
		<label for="email">Email:</label>
		<input type="Email" id="email" placeholder="Email" required/>
	      <br>
		<label for="gender">Gender:</label>
		<label for="gender">Male:</label>
		<input type="Radio" id="gender_m" name="gender" required/>
		<label for="gender">Female:</label>
		<input type="Radio" id="gender_f" name="gender" required/>
		<br>
		<select placeholder="--Please choose an option--">
			<option> TATA</option>
			<option> SUZUKI</option>
			<option>MAHINDRA </option>
		</select>
		<br>
		<label>Age:</label>
		<input type="Number" id="age" placeholder="age" required/>
		<br>
		<label>DOB:</label>
		<input type="date" id="dob" required/>
		<br>
		<label>Phone Number:</label>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx">
		<br>
		<label>Password:</label>
		<input type="Password" id="password" placeholder="Password" required/>
		<br>
		<label>I agree to the TOS</label>
		<input type="checkbox" id="tos" required/>
		<br>
		<button>Submit</button>
		
	</form>
	<script type="text/javascript" src="./script.js">
</script>

</body>

</html>
